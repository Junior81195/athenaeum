services:
  db:
    image: pgvector/pgvector:pg16
    container_name: handbook_library_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5442:5432"
    environment:
      POSTGRES_DB: handbook_library
      POSTGRES_USER: handbook_library
      POSTGRES_PASSWORD: ${HANDBOOK_LIBRARY_DB_PASSWORD:?Set HANDBOOK_LIBRARY_DB_PASSWORD in .env or hercules.env}
    volumes:
      - handbook_library_pgdata:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handbook_library"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: handbook_library_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8140:8000"
    environment:
      DATABASE_URL: postgresql://handbook_library:${HANDBOOK_LIBRARY_DB_PASSWORD}@db:5432/handbook_library
      PYTHONPATH: /app
      LLM_PROVIDER: openai
      LLM_MODEL: auto
      LLM_API_KEY: "free"
      LLM_BASE_URL: "http://free_llm_api:8000/v1"
    networks:
      - default
      - hercules_platform
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: handbook_library_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3140:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8140}
    depends_on:
      - api

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24
  hercules_platform:
    external: true
    name: hercules-platform_default

volumes:
  handbook_library_pgdata:
